{% set name = "bgcargo" %}
{% set version = "0.2.8" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/bgcArgo-{{ version }}.tar.gz
  sha256: 1108ea495a23ec94f10adcb215a67d810f1616003f64cb76f4351d2c7d4aeb80

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - cmocean
    - gsw
    - matplotlib-base
    - netcdf4
    - numpy
    - pandas
    - python >={{ python_min }}
    - scipy
    - seaborn

test:
  imports:
    - bgcArgo
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/ArgoCanada/BGC-QC
  summary: A python library for quality control of BGC-Argo data
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - cgrdn
